name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install pytest pytest-cov
      - name: Run tests + coverage gate
        run: pytest scripts/ -v --cov=scripts --cov-report=term-missing --cov-fail-under=85

  coverage:
    # Coverage badge + per-PR comment (self-contained, no third-party service).
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install pytest coverage
      - name: Measure coverage
        run: |
          coverage run -m pytest scripts/
          coverage report
      - name: Coverage badge + PR comment
        uses: py-cov-action/python-coverage-comment-action@9859324f04326f165029e28728392684ea5c6baf # v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
